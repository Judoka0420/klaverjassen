name: Build Android APK

# Builds an installable debug APK in the cloud (no local Android SDK / Mac needed).
# Download it from the run's "Artifacts" section and sideload onto any Android phone
# (enable "Install unknown apps" for your browser/file manager first).
#
# Assumes this repository's root is the "klaverjassen" folder, so the Capacitor
# project lives at ./app and the shared rules engine at ./engine.js.

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'engine.js'
      - 'game-room.js'
      - '.github/workflows/android.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Sync web assets + Capacitor
        working-directory: app
        run: |
          npm run sync-assets
          npx cap sync android

      - name: Build debug APK
        working-directory: app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: klaverjassen-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
